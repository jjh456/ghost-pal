<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d0f">
<title>Ghost Pal</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icons/logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
<link rel="shortcut icon" href="./icons/favicon.ico">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="app-header">
  <div class="app-header__title">
    <img class="app-header__logo" src="./icons/logo.svg" alt="" width="44" height="44">
    <h1>Ghost Pal</h1>
  </div>
  <button id="resetBtn" class="btn btn--ghost" type="button">Reset</button>
</header>

<main>
  <section class="panel panel--row" aria-labelledby="gender-heading">
    <h2 id="gender-heading" class="panel__title">Gender</h2>
    <div class="chip-row" id="genderRow">
      <button class="chip chip--sm" data-gender="male" aria-pressed="false">Male</button>
      <button class="chip chip--sm" data-gender="female" aria-pressed="false">Female</button>
    </div>
  </section>

  <section class="panel" aria-labelledby="evidence-heading">
    <h2 id="evidence-heading" class="panel__title">Evidence</h2>
    <div class="chip-row chip-row--wrap" id="evidenceRow"></div>
  </section>

  <section class="panel" aria-labelledby="traits-heading">
    <button class="panel__toggle" id="traitsToggle" type="button" aria-expanded="true" aria-controls="traitsRow">
      <h2 id="traits-heading" class="panel__title">Behavior traits</h2>
      <span class="panel__toggle-label" id="traitsToggleLabel">Collapse</span>
    </button>
    <p class="panel__note panel__note--dim" id="traitsHint">Confirm a bit more evidence to see relevant traits.</p>
    <div class="chip-row chip-row--wrap" id="traitsRow" hidden></div>
  </section>

  <section class="panel panel--results" aria-labelledby="results-heading">
    <div class="panel__results-head">
      <h2 id="results-heading" class="panel__title">Possible ghosts</h2>
      <span id="resultCount" class="panel__count">29 / 29</span>
    </div>
    <ul id="resultsList" class="results-list"></ul>
  </section>
</main>

<script src="./app.js"></script>
</body>
</html>
