<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d0f">
<title>Ghost Pal</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icons/logo.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
<link rel="shortcut icon" href="./icons/favicon.ico">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="app-header">
  <div class="app-header__title">
    <span class="app-header__logo-wrap">
      <img class="app-header__logo" src="./icons/logo.svg" alt="" width="44" height="44">
    </span>
    <h1>Ghost Pal</h1>
  </div>
  <button id="resetBtn" class="btn btn--ghost" type="button">Reset</button>
</header>

<main>
  <section class="panel panel--obs" aria-labelledby="obs-heading">
    <h2 id="obs-heading" class="panel__title">Observations</h2>
    <div class="obs-cycle-row">
      <button class="obs-cycle" type="button" data-obs="gender">
        <span class="obs-cycle__key">Gender</span><span class="obs-cycle__val">—</span>
      </button>
      <button class="obs-cycle" type="button" data-obs="huntSpeed">
        <span class="obs-cycle__key">Speed</span><span class="obs-cycle__val">—</span>
      </button>
      <button class="obs-cycle" type="button" data-obs="losAccel">
        <span class="obs-cycle__key">LoS</span><span class="obs-cycle__val">—</span>
      </button>
    </div>
    <div class="obs-divider" id="evidence-label">Evidence</div>
    <div class="obs-row obs-row--top">
      <div class="chip-row chip-row--wrap" id="evidenceRow" role="group" aria-labelledby="evidence-label"></div>
    </div>
  </section>

  <section class="panel" aria-labelledby="traits-heading">
    <button class="panel__toggle" id="traitsToggle" type="button" aria-expanded="false" aria-controls="traitsRow">
      <h2 id="traits-heading" class="panel__title">Behaviors</h2>
      <span class="panel__toggle-meta">
        <span class="panel__count" id="traitsCount">19/19 possible</span>
        <span class="panel__toggle-label" id="traitsToggleLabel">Expand</span>
      </span>
    </button>
    <div class="chip-row chip-row--wrap" id="traitsRow" hidden></div>
  </section>

  <section class="panel panel--results" aria-labelledby="results-heading">
    <div class="panel__results-head">
      <h2 id="results-heading" class="panel__title">Possible ghosts</h2>
      <span id="resultCount" class="panel__count">29 / 29</span>
    </div>
    <ul id="resultsList" class="results-list"></ul>
  </section>
</main>

<script src="./app.js"></script>
</body>
</html>
